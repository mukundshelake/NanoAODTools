# environment_lxplus.yml
# Cross-platform conda environment for lxplus (EL9 / AlmaLinux 9).
#
# Unlike environment.yml (which is a full pinned export tied to the TIFR
# machine's build hashes), this file contains only version constraints so
# conda/mamba can resolve the correct binaries for lxplus.
#
# Create the env:
#   mamba env create -f environment_lxplus.yml   # recommended — much faster
#   # or:
#   conda env create -f environment_lxplus.yml
#
# Then activate and finish the standalone setup:
#   conda activate latestcoffea
#   source standalone/env_standalone.sh

name: latestcoffea
channels:
  - conda-forge
  - defaults
dependencies:
  # --- Core language ---
  - python=3.11

  # --- ROOT (PyROOT + NanoAODTools PostProcessor) ---
  - root>=6.28        # 6.28+ required for correctionlib; 6.36 if available

  # --- XRootD (EOS / remote file access) ---
  - xrootd>=5.6

  # --- Numerics / IO ---
  - numpy>=1.24
  - tqdm
  - pyyaml>=6.0
  - zstd                # needed to read zstd-compressed NanoAOD files via ROOT

  # --- pip-only packages ---
  - pip
  - pip:
      # NanoAOD / HEP analysis
      - uproot>=5.0
      - awkward>=2.0
      - vector>=1.0
      - coffea>=2024.1.0
      - correctionlib>=2.4

      # Histogramming
      - hist>=2.7

      # Data / ML / plotting
      - scipy>=1.10
      - matplotlib>=3.7
      - pandas>=2.0
      - scikit-learn>=1.3   # BDT training (004B-BDT/scripts/BDT.py)
      - joblib>=1.3         # BDT model serialization

      # Dask distributed processing
      - dask>=2024.1.0
      - dask-awkward

      # Utilities
      - jinja2>=3.0         # config template rendering (configs/renderer.py)
      - requests>=2.31      # Telegram notifications (send_telegram.py)
      - python-dotenv>=1.0  # .env loading (send_telegram.py)
